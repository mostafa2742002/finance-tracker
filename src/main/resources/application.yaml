server:
  port: 8081

app:
  cors:
    allowed-origins: http://localhost:3000

spring:
  application:
    name: finance-tracker

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  # dev-safe fallback; override via environment in non-local deployments
  secret: bXlTdXBlclNlY3JldEtleUZvckp3dFNpZ25pbmcxMjM0NTY3ODkwMTIzNDU2
  expiration: 3600000
  refresh-expiration: 604800000
