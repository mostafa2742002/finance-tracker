server:
  port: 8081

app:
  cors:
    allowed-origins: http://localhost:3000

spring:
  config:
    import: optional:classpath:application-dev.yaml

  application:
    name: finance-tracker

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-1.5-flash}

jwt:
  # dev-safe fallback; override via environment in non-local deployments
  secret: bXlTdXBlclNlY3JldEtleUZvckp3dFNpZ25pbmcxMjM0NTY3ODkwMTIzNDU2
  expiration: 3600000
  refresh-expiration: 604800000
